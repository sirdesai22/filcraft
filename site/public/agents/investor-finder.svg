<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0f2b1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a8fd8"/>
      <stop offset="100%" stop-color="#4caf7a"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="8" fill="url(#bg)"/>
  <!-- Magnifying glass circle -->
  <circle cx="52" cy="52" r="28" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.9"/>
  <!-- Magnifying glass handle -->
  <line x1="72" y1="72" x2="96" y2="96" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <!-- Upward trend line (finding/growth) -->
  <path d="M28 80 L44 64 L60 72 L76 48 L92 56" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <rect width="128" height="128" rx="8" fill="none" stroke="rgba(106,143,216,0.2)" stroke-width="2"/>
</svg>
